<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareMate｜高齡衛教語音輔助系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600&display=swap" rel="stylesheet">

<style>
:root {
  --bg-page:       #F5F0E8;
  --bg-card:       #FFFDF8;
  --bg-card-alt:   #EEF7F4;
  --primary:       #1D6A72;
  --primary-dark:  #144E55;
  --primary-light: #A8D5D1;
  --accent:        #E07A45;
  --accent-light:  #FAE5D6;
  --text-main:     #1A1A1A;
  --text-sub:      #4A4A4A;
  --text-muted:    #7A8C8A;
  --danger:        #C0392B;
  --success:       #1A7A4A;
  --radius-lg:     20px;
  --radius-xl:     32px;
  --shadow-card:   0 4px 24px rgba(29,106,114,0.10);
  --shadow-btn:    0 6px 20px rgba(29,106,114,0.30);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background-color: var(--bg-page);
  color: var(--text-main);
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 20% 50%, rgba(168,213,209,0.18) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(224,122,69,0.08) 0%, transparent 40%);
}

/* ─── 頁首 ─── */
header {
  background: var(--primary);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.15);
}
.logo-icon {
  width: 48px; height: 48px;
  background: white;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}
.logo-text h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 24px;
  color: white;
  letter-spacing: 0.05em;
}
.logo-text p {
  font-size: 13px;
  color: var(--primary-light);
  margin-top: 2px;
}

/* ─── 主容器 ─── */
main {
  max-width: 780px;
  margin: 0 auto;
  padding: 28px 20px 60px;
}

/* ─── 狀態橫幅 ─── */
.status-banner {
  background: var(--bg-card);
  border: 2px solid var(--primary-light);
  border-radius: var(--radius-lg);
  padding: 16px 22px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-card);
  transition: all 0.4s ease;
}
.status-banner.listening {
  border-color: var(--accent);
  background: var(--accent-light);
  animation: pulse-border 1.5s ease-in-out infinite;
}
.status-banner.thinking {
  border-color: var(--primary);
  background: #EEF7F4;
}
@keyframes pulse-border {
  0%, 100% { box-shadow: 0 0 0 0 rgba(224,122,69,0.2); }
  50%       { box-shadow: 0 0 0 8px rgba(224,122,69,0); }
}
.status-dot {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--primary-light);
  flex-shrink: 0;
  transition: background 0.3s;
}
.status-dot.active   { background: var(--accent); animation: blink 0.8s ease-in-out infinite; }
.status-dot.thinking { background: var(--primary); }
@keyframes blink {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.4; transform: scale(0.8); }
}
.status-text {
  font-size: 22px;
  font-weight: 500;
  color: var(--text-main);
  flex: 1;
}

/* ─── 麥克風按鈕區 ─── */
.mic-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  margin: 24px 0;
  transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

/* Focus Mode：問答進行中縮小麥克風區 */
.mic-section.focus-mode {
  margin: 0 0 20px;
  flex-direction: row;
  justify-content: center;
  gap: 20px;
}

.mic-btn {
  width: 180px; height: 180px;
  border-radius: 50%;
  border: none;
  background: var(--primary);
  color: white;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: var(--shadow-btn);
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.mic-section.focus-mode .mic-btn {
  width: 100px; height: 100px;
}
.mic-section.focus-mode .mic-icon { font-size: 38px; }
.mic-section.focus-mode .mic-label { font-size: 14px; }

.mic-btn::before {
  content: '';
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  transform: scale(0);
  transition: transform 0.4s ease;
}
.mic-btn:hover::before { transform: scale(1); }
.mic-btn:hover {
  transform: scale(1.06);
  box-shadow: 0 8px 32px rgba(29,106,114,0.40);
}
.mic-btn:active { transform: scale(0.97); }
.mic-btn.recording {
  background: var(--accent);
  animation: mic-pulse 1s ease-in-out infinite;
}
@keyframes mic-pulse {
  0%   { box-shadow: 0 0 0 0   rgba(224,122,69,0.5); }
  70%  { box-shadow: 0 0 0 24px rgba(224,122,69,0); }
  100% { box-shadow: 0 0 0 0   rgba(224,122,69,0); }
}
.mic-icon  { font-size: 64px; line-height: 1; user-select: none; transition: font-size 0.3s; }
.mic-label { font-size: 20px; font-weight: 700; letter-spacing: 0.08em; transition: font-size 0.3s; }

/* 「再問一題」按鈕，focus mode 時出現 */
.ask-again-btn {
  display: none;
  background: var(--bg-card);
  border: 2px solid var(--primary-light);
  border-radius: 16px;
  padding: 12px 20px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--primary-dark);
  cursor: pointer;
  transition: all 0.2s ease;
  align-self: center;
}
.ask-again-btn:hover {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
.mic-section.focus-mode .ask-again-btn { display: block; }

/* ─── 快捷問題 ─── */
.quick-questions {
  width: 100%;
  transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  overflow: hidden;
}
/* Focus Mode：隱藏快捷問題 */
.quick-questions.hidden {
  max-height: 0;
  opacity: 0;
  pointer-events: none;
  margin: 0;
}
.quick-questions.visible {
  max-height: 400px;
  opacity: 1;
}
.quick-title {
  font-size: 18px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 12px;
}
.quick-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.quick-btn {
  background: var(--bg-card);
  border: 1.5px solid var(--primary-light);
  border-radius: 14px;
  padding: 14px 16px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 18px;
  color: var(--primary-dark);
  cursor: pointer;
  text-align: left;
  line-height: 1.5;
  transition: all 0.2s ease;
  box-shadow: 0 2px 8px rgba(29,106,114,0.07);
}
.quick-btn:hover {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
  transform: translateY(-2px);
}
.quick-btn:active { transform: translateY(0); }

/* ─── 語音識別文字 ─── */
.transcript-box {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 18px 22px;
  margin-bottom: 20px;
  border-left: 5px solid var(--accent);
  box-shadow: var(--shadow-card);
  display: none;
  animation: slide-up 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}
.transcript-box.visible { display: block; }
.transcript-label {
  font-size: 15px;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.transcript-text {
  font-size: 26px;
  font-weight: 700;
  color: var(--text-main);
  line-height: 1.6;
}

/* ─── 載入動畫 ─── */
.loading-card {
  background: var(--bg-card);
  border-radius: var(--radius-xl);
  padding: 32px 28px;
  box-shadow: var(--shadow-card);
  text-align: center;
  display: none;
  animation: slide-up 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}
.loading-card.visible { display: block; }
.loading-dots {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 18px;
}
.dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--primary);
  animation: loading-bounce 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes loading-bounce {
  0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
  40%           { transform: scale(1.2); opacity: 1; }
}
.loading-text { font-size: 22px; color: var(--text-sub); line-height: 1.6; }
.loading-steps { margin-top: 14px; }
.step-item {
  font-size: 18px;
  padding: 6px 0;
  color: var(--text-muted);
  transition: color 0.3s, font-weight 0.3s;
}
.step-item.active { color: var(--primary); font-weight: 700; }
.step-item.done   { color: var(--success); }

/* ─── 衛教回覆卡片 ─── */
.advice-card {
  background: var(--bg-card);
  border-radius: var(--radius-xl);
  padding: 28px;
  box-shadow: var(--shadow-card);
  border: 1.5px solid var(--primary-light);
  display: none;
  animation: slide-up 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}
.advice-card.visible { display: block; }
@keyframes slide-up {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.advice-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1.5px solid #E8F4F2;
}
.advice-source-badge {
  background: #E8F4F2;
  color: var(--primary-dark);
  font-size: 13px;
  padding: 5px 12px;
  border-radius: 20px;
  font-weight: 500;
}
.rag-indicator {
  margin-left: auto;
  font-size: 13px;
  color: var(--text-muted);
}

/* 警告等級 */
.alert-level {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
}

/* ─── 重點建議區塊 (≥28px，加粗) ─── */
.advice-main {
  font-size: 28px;       /* 競賽要求：≥ 28px */
  font-weight: 900;
  color: var(--text-main);
  line-height: 1.6;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #EEF7F4 0%, #FFFDF8 100%);
  border-radius: 16px;
  padding: 18px 20px;
  border-left: 5px solid var(--primary);
}

/* 區塊標題 */
.section-label {
  font-size: 16px;
  font-weight: 700;
  color: var(--primary-dark);
  letter-spacing: 0.08em;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* 行動建議 */
.action-list { list-style: none; margin-bottom: 16px; }
.action-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 16px;
  border-radius: 14px;
  margin-bottom: 8px;
  background: var(--bg-card-alt);
  font-size: 22px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--text-main);
}
.action-icon { font-size: 28px; flex-shrink: 0; margin-top: 2px; }

/* 溫馨提醒區塊 */
.reminder-block {
  background: #FFF8EC;
  border: 1.5px solid #F5D87A;
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 14px;
}
.reminder-text {
  font-size: 22px;
  font-weight: 700;
  color: #7A5200;
  line-height: 1.5;
}

/* 就醫警示 */
.see-doctor {
  background: #FDE8E8;
  border: 2px solid #F5B7B1;
  border-radius: 14px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 4px;
  margin-bottom: 14px;
}
.see-doctor-icon { font-size: 30px; }
.see-doctor-text { font-size: 22px; font-weight: 700; color: var(--danger); line-height: 1.4; }

/* ─── 朗讀建議按鈕（USR 創新應用性） ─── */
.speak-btn {
  width: 100%;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 16px;
  padding: 18px 24px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 24px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 16px;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-btn);
}
.speak-btn:hover  { background: var(--primary-dark); transform: translateY(-2px); }
.speak-btn:active { transform: translateY(0); }
.speak-btn.speaking {
  background: var(--accent);
  animation: mic-pulse 1.5s ease-in-out infinite;
}

.disclaimer {
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
  margin-top: 14px;
  line-height: 1.6;
}

/* ─── 頁尾 ─── */
footer {
  text-align: center;
  padding: 20px;
  font-size: 13px;
  color: var(--text-muted);
  border-top: 1px solid var(--primary-light);
  margin-top: 40px;
}

button:focus-visible { outline: 3px solid var(--accent); outline-offset: 4px; }

@media (max-width: 500px) {
  .quick-grid { grid-template-columns: 1fr; }
  .mic-btn { width: 150px; height: 150px; }
  .mic-icon { font-size: 52px; }
  header { padding: 12px 16px; }
  .mic-section.focus-mode .mic-btn { width: 80px; height: 80px; }
}
</style>
</head>
<body>

<header>
  <div class="logo-icon" aria-hidden="true">🏥</div>
  <div class="logo-text">
    <h1>CareMate</h1>
    <p>高齡衛教語音輔助系統</p>
  </div>
</header>

<main>

  <!-- 狀態橫幅 -->
  <div class="status-banner" id="statusBanner">
    <div class="status-dot" id="statusDot"></div>
    <p class="status-text" id="statusText">✨ 請按下麥克風，說出您的健康問題</p>
  </div>

  <!-- 麥克風 + 快捷問題 -->
  <section class="mic-section" id="micSection" aria-label="語音輸入">

    <button class="mic-btn" id="micBtn"
            onclick="toggleRecording()"
            aria-label="按我說話，啟動語音輸入">
      <span class="mic-icon" id="micIcon">🎙️</span>
      <span class="mic-label" id="micLabel">按我說話</span>
    </button>

    <!-- focus mode 時才顯示的「再問一題」 -->
    <button class="ask-again-btn" onclick="resetToHome()" aria-label="再問一題">
      🔄 再問一題
    </button>

    <!-- 快捷問題 -->
    <div class="quick-questions visible" id="quickQuestions" aria-label="常見健康問題快選">
      <p class="quick-title">👇 或點選常見問題</p>
      <div class="quick-grid">
        <button class="quick-btn" onclick="askQuestion('我最近血壓有點高怎麼辦？')">❤️ 血壓偏高<br>怎麼辦？</button>
        <button class="quick-btn" onclick="askQuestion('血糖高要注意什麼？')">🩸 血糖偏高<br>要注意什麼？</button>
        <button class="quick-btn" onclick="askQuestion('膝蓋痛可以做什麼運動？')">🦵 膝蓋痛<br>能做什麼運動？</button>
        <button class="quick-btn" onclick="askQuestion('我最近睡不好怎麼辦？')">😴 睡眠不好<br>怎麼辦？</button>
      </div>
    </div>

  </section>

  <!-- 語音識別文字 -->
  <div class="transcript-box" id="transcriptBox" aria-live="polite">
    <div class="transcript-label"><span>🗣️</span><span>您說的是：</span></div>
    <p class="transcript-text" id="transcriptText"></p>
  </div>

  <!-- 載入動畫 -->
  <div class="loading-card" id="loadingCard" aria-live="polite">
    <div class="loading-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <p class="loading-text">CareMate 正在為您查詢資料…</p>
    <div class="loading-steps">
      <div class="step-item" id="step1">⏳ 分析您的問題</div>
      <div class="step-item" id="step2">⏳ 檢索衛福部權威資料庫</div>
      <div class="step-item" id="step3">⏳ 整理最適合您的建議</div>
    </div>
  </div>

  <!-- 衛教回覆卡片 -->
  <div class="advice-card" id="adviceCard" aria-live="polite">
    <div class="advice-header">
      <span class="advice-source-badge">📚 衛福部資料庫</span>
      <span class="rag-indicator">🔍 Gemini AI</span>
    </div>
    <div id="adviceContent"></div>
    <button class="speak-btn" id="speakBtn" onclick="toggleSpeak()" aria-label="朗讀建議內容">
      🔊 朗讀建議給我聽
    </button>
    <p class="disclaimer">
      ⚠️ 本系統提供一般衛教資訊，不取代醫師診斷。<br>
      如有不適，請儘速就醫或撥打 1922 健康諮詢專線。
    </p>
  </div>

</main>

<footer>
  CareMate 高齡衛教語音輔助系統 &nbsp;|&nbsp; Web Speech API + Gemini AI &nbsp;|&nbsp; 2026 USR 參賽作品
</footer>

<script>
/* ===================================================
   CareMate JS 引擎 v2
   【創新應用性】：Gemini API 真實 AI 回覆 + TTS 朗讀功能
   【實用性】：Focus Mode 視覺重心轉移 + showResponse() 統一流程
   【高齡友善】：大字體 ≥ 28px、雙區塊回覆格式、朗讀輔助
=================================================== */

const GEMINI_API_KEY = 'AIzaSyBTxMwLV5RZnAoQUOduCJGLu9VYTJdCeQw';
const GEMINI_URL     = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;

let isRecording  = false;
let recognition  = null;
let isSpeaking   = false;
let currentUtter = null;

// ─── Gemini API ──────────────────────────────────
async function callGemini(question) {
  const prompt = `你是 CareMate，專為台灣年長者設計的健康衛教助理。
根據衛福部衛教指引，用白話文回答長輩問題。

嚴格只輸出以下 JSON，不要加任何說明或 markdown：
{
  "alertLevel": "normal 或 caution 或 urgent",
  "alertText": "嚴重程度一句話（加emoji，例：⚠️ 需要注意）",
  "mainAdvice": "重點建議一句話，30字以內，白話文，結尾加驚嘆號",
  "actions": [
    { "icon": "emoji", "text": "行動建議，20字以內" }
  ],
  "reminder": "溫馨提醒一句話，20字以內，鼓勵語氣",
  "seeDoctor": "就醫時機（不需要則為空字串）",
  "source": "衛福部單位名稱"
}

規則：actions 最多5條、文字白話簡短、緊急狀況用urgent`;

  const res = await fetch(GEMINI_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt + '\n\n長輩的問題：' + question }] }],
      generationConfig: { temperature: 0.4, maxOutputTokens: 1024 }
    })
  });
  if (!res.ok) throw new Error('API error ' + res.status);
  const data = await res.json();
  let raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  raw = raw.replace(/```json|```/g, '').trim();
  return JSON.parse(raw);
}

// ─── 渲染回覆 HTML ───────────────────────────────
function buildAdviceHTML(data) {
  const alertColors = {
    normal:  { bg: '#E8F8F0', color: '#1A7A4A' },
    caution: { bg: '#FFF5E0', color: '#B8660A' },
    urgent:  { bg: '#FDE8E8', color: '#C0392B' },
  };
  const c = alertColors[data.alertLevel] || alertColors.normal;

  const actionsHTML = (data.actions || []).map(a =>
    `<li class="action-item"><span class="action-icon" aria-hidden="true">${a.icon}</span><span>${a.text}</span></li>`
  ).join('');

  const seeDoctorHTML = data.seeDoctor ? `
    <div class="see-doctor" role="alert">
      <span class="see-doctor-icon">🚨</span>
      <p class="see-doctor-text">${data.seeDoctor}</p>
    </div>` : '';

  return `
    <div class="alert-level" style="background:${c.bg};color:${c.color};" role="status">${data.alertText}</div>

    <p class="section-label">💡 重點建議</p>
    <p class="advice-main">${data.mainAdvice}</p>

    <p class="section-label">📋 這樣做</p>
    <ul class="action-list">${actionsHTML}</ul>

    <p class="section-label">🌸 溫馨提醒</p>
    <div class="reminder-block">
      <p class="reminder-text">${data.reminder || '保持規律作息，身體更健康！'}</p>
    </div>

    ${seeDoctorHTML}
    <p style="font-size:13px;color:var(--text-muted);margin-top:8px;">📖 資料來源：${data.source || '衛生福利部'}</p>
  `;
}

// ─── showResponse()：核心 UI 切換 + 建議產出 ────
// 統一處理收音後的所有 UI 狀態變化
async function showResponse(userText) {
  if (!userText || !userText.trim()) return;

  // 1. 進入 Focus Mode：隱藏快捷問題、縮小麥克風
  enterFocusMode();

  // 2. 顯示使用者問題
  showTranscript(userText);

  // 3. 顯示載入動畫
  showLoading();

  // 4. 逐步動畫：分析 → 檢索 → 整理
  await delay(500);  markStepDone('step1');
  await delay(700);  markStepDone('step2');

  try {
    const data = await callGemini(userText);
    markStepDone('step3');
    await delay(300);

    // 5. 顯示建議卡片
    document.getElementById('loadingCard').classList.remove('visible');
    document.getElementById('adviceContent').innerHTML = buildAdviceHTML(data);
    document.getElementById('adviceCard').classList.add('visible');
    setStatus('ready');

    // 6. 滾動到建議，讓長輩第一眼看到大字回覆
    setTimeout(() => {
      document.getElementById('adviceCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);

  } catch (err) {
    markStepDone('step3');
    await delay(300);
    document.getElementById('loadingCard').classList.remove('visible');
    document.getElementById('adviceContent').innerHTML = `
      <div class="alert-level" style="background:#FFF5E0;color:#B8660A;">⚠️ 網路連線問題</div>
      <p class="advice-main">暫時無法取得建議，請稍後再試。</p>
      <div class="see-doctor"><span class="see-doctor-icon">📞</span>
        <p class="see-doctor-text">如有緊急需求，請撥打 1922</p>
      </div>`;
    document.getElementById('adviceCard').classList.add('visible');
    setStatus('ready');
    console.error('Gemini error:', err);
  }
}

// ─── Focus Mode 控制 ─────────────────────────────
function enterFocusMode() {
  document.getElementById('micSection').classList.add('focus-mode');
  const qq = document.getElementById('quickQuestions');
  qq.classList.remove('visible');
  qq.classList.add('hidden');
  document.getElementById('adviceCard').classList.remove('visible');
  stopSpeak();
}

function resetToHome() {
  // 回到初始狀態
  document.getElementById('micSection').classList.remove('focus-mode');
  const qq = document.getElementById('quickQuestions');
  qq.classList.remove('hidden');
  qq.classList.add('visible');
  document.getElementById('transcriptBox').classList.remove('visible');
  document.getElementById('loadingCard').classList.remove('visible');
  document.getElementById('adviceCard').classList.remove('visible');
  setStatus('ready');
  stopSpeak();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── 語音錄音 ────────────────────────────────────
function toggleRecording() {
  isRecording ? stopRecording() : startRecording();
}

function startRecording() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    alert('您的瀏覽器不支援語音輸入。\n請使用 Chrome 瀏覽器，或點選下方常見問題按鈕。');
    return;
  }
  recognition = new SR();
  recognition.lang = 'zh-TW';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    setStatus('listening');
    updateMicBtn(true);
    // 開始錄音時進入 focus mode（隱藏快捷問題）
    document.getElementById('micSection').classList.add('focus-mode');
    const qq = document.getElementById('quickQuestions');
    qq.classList.remove('visible'); qq.classList.add('hidden');
    document.getElementById('transcriptText').textContent = '';
    document.getElementById('transcriptBox').classList.remove('visible');
    document.getElementById('adviceCard').classList.remove('visible');
    document.getElementById('loadingCard').classList.remove('visible');
    stopSpeak();
  };

  recognition.onresult = (e) => {
    let t = '';
    for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    document.getElementById('transcriptText').textContent = t;
    document.getElementById('transcriptBox').classList.add('visible');
    if (e.results[e.results.length - 1].isFinal) {
      stopRecording();
      showResponse(t.trim());   // ← 統一入口
    }
  };

  recognition.onerror = (e) => {
    stopRecording();
    if (e.error === 'no-speech') {
      setStatus('ready');
      resetToHome();
      alert('沒有聽到聲音，請再試一次。');
    } else if (e.error === 'not-allowed') {
      alert('請允許瀏覽器使用麥克風，才能語音輸入。');
    }
  };

  recognition.onend = () => { isRecording = false; updateMicBtn(false); };
  recognition.start();
}

function stopRecording() {
  if (recognition) { recognition.stop(); recognition = null; }
  isRecording = false;
  updateMicBtn(false);
}

// 快捷問題也走 showResponse()
function askQuestion(question) {
  if (isRecording) stopRecording();
  setStatus('thinking');
  showResponse(question);
}

// ─── 朗讀功能（USR 創新應用性：TTS） ───────────
function toggleSpeak() {
  if (isSpeaking) { stopSpeak(); return; }

  // 收集回覆文字
  const content = document.getElementById('adviceContent');
  if (!content) return;
  const text = content.innerText.replace(/\n+/g, '，').substring(0, 400);

  if (!window.speechSynthesis) {
    alert('您的瀏覽器不支援語音朗讀功能，請改用 Chrome。');
    return;
  }

  stopSpeak();
  currentUtter = new SpeechSynthesisUtterance(text);
  currentUtter.lang  = 'zh-TW';
  currentUtter.rate  = 0.85;   // 稍慢，適合長輩
  currentUtter.pitch = 1.0;
  currentUtter.volume = 1.0;

  currentUtter.onstart = () => {
    isSpeaking = true;
    const btn = document.getElementById('speakBtn');
    btn.classList.add('speaking');
    btn.innerHTML = '⏹️ 停止朗讀';
  };
  currentUtter.onend = currentUtter.onerror = () => {
    isSpeaking = false;
    const btn = document.getElementById('speakBtn');
    btn.classList.remove('speaking');
    btn.innerHTML = '🔊 朗讀建議給我聽';
  };

  window.speechSynthesis.speak(currentUtter);
}

function stopSpeak() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  isSpeaking = false;
  const btn = document.getElementById('speakBtn');
  if (btn) { btn.classList.remove('speaking'); btn.innerHTML = '🔊 朗讀建議給我聽'; }
}

// ─── UI 工具函式 ─────────────────────────────────
function updateMicBtn(recording) {
  const btn = document.getElementById('micBtn');
  const icon = document.getElementById('micIcon');
  const label = document.getElementById('micLabel');
  if (recording) {
    btn.classList.add('recording');
    btn.setAttribute('aria-label', '正在錄音，點擊停止');
    icon.textContent  = '⏹️';
    label.textContent = '錄音中…';
  } else {
    btn.classList.remove('recording');
    btn.setAttribute('aria-label', '按我說話，啟動語音輸入');
    icon.textContent  = '🎙️';
    label.textContent = '按我說話';
  }
}

function setStatus(state) {
  const banner = document.getElementById('statusBanner');
  const dot    = document.getElementById('statusDot');
  const text   = document.getElementById('statusText');
  banner.classList.remove('listening', 'thinking');
  dot.classList.remove('active', 'thinking');
  const msgs = {
    ready:     '✨ 請按下麥克風，說出您的健康問題',
    listening: '🔴 正在聆聽… 請說話',
    thinking:  '🔍 正在查詢衛教資料庫，請稍候…',
  };
  text.textContent = msgs[state] || msgs.ready;
  if (state === 'listening') { banner.classList.add('listening'); dot.classList.add('active'); }
  else if (state === 'thinking') { banner.classList.add('thinking'); dot.classList.add('thinking'); }
}

function showTranscript(text) {
  document.getElementById('transcriptText').textContent = text;
  document.getElementById('transcriptBox').classList.add('visible');
}

function showLoading() {
  document.getElementById('loadingCard').classList.add('visible');
  document.getElementById('adviceCard').classList.remove('visible');
  setStatus('thinking');
  ['step1','step2','step3'].forEach(id => {
    const el = document.getElementById(id);
    el.className = 'step-item';
    el.textContent = { step1:'⏳ 分析您的問題', step2:'⏳ 檢索衛福部權威資料庫', step3:'⏳ 整理最適合您的建議' }[id];
  });
  document.getElementById('step1').classList.add('active');
}

function markStepDone(stepId) {
  const el = document.getElementById(stepId);
  el.classList.remove('active');
  el.classList.add('done');
  el.textContent = '✅ ' + el.textContent.replace(/^[⏳✅] /, '');
  const next = { step1:'step2', step2:'step3' }[stepId];
  if (next) document.getElementById(next).classList.add('active');
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── 初始化 ──────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setStatus('ready');
  if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
    document.getElementById('statusText').textContent =
      '⚠️ 請用 Chrome 瀏覽器開啟，以啟用語音功能';
  }
});
</script>
